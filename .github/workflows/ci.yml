name: CI

on:
  push:
    paths-ignore:
      - "**.md"
      - "**.rst"
      - "**.ipynb"
      - "docs/**"
      - ".readthedocs.yaml"
  pull_request:
    paths-ignore:
      - "**.md"
      - "**.rst"
      - "**.ipynb"
      - "docs/**"
      - ".readthedocs.yaml"
  release:
    types:
      - published
  workflow_dispatch:

env:
  buildDir: "${{ github.workspace }}/build/"
  NWN_ROOT: "${{ github.workspace }}/nwn/"
  CI_GITHUB_ACTIONS: "1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform_name: macOS
            compiler_name: AppleClang
          - os: ubuntu-22.04
            platform_name: Linux
            compiler_name: GCC
          - os: windows-2022
            platform_name: Windows
            compiler_name: MSVC
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform_name }} ${{ matrix.compiler_name }} Tests

    steps:
      - name: Get current date
        if: matrix.os != 'windows-2022'
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Get current date
        if: matrix.os == 'windows-2022'
        run: |
          echo "DATE=$(Get-Date -Format yyyy-MM-dd)" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Windows dependencies
      - name: windows - install dependencies
        if: matrix.os == 'windows-2022'
        run: |
          choco upgrade ccache ninja

      # macOS Dependencies
      - name: macOS - install dependencies
        if: matrix.os == 'macos-14'
        env:
          HOMEBREW_NO_ANALYTICS: "ON"
          HOMEBREW_NO_AUTO_UPDATE: "ON"
          HOMEBREW_NO_BOTTLE_SOURCE_FALLBACK: "ON"
          HOMEBREW_NO_INSTALL_CLEANUP: "ON"
        run: |
          brew install --force --overwrite pkg-config automake ninja libtool zlib ccache

      # Linux dependencies
      - name: linux - install gcc
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt update
          sudo apt install gcc-15 g++-15 ccache -y
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-15 100

      - uses: actions/checkout@v7
        with:
          submodules: true

      # Install latest CMake.
      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.29.4

      - name: all - cache ccache
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.ccache/
          key: ${{ matrix.os }}-ccache-${{ env.DATE }}
          restore-keys: |
            ${{ matrix.os }}-ccache-

      # nwn
      - name: all - cache nwn
        id: cache-nwn
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/nwn/
          key: cache-nwn-3e02cddcea5d0ae82111a3038f14aef6c14d05d9

      - name: all - download nwn
        if: steps.cache-nwn.outputs.cache-hit != 'true' && runner.os != 'Windows'
        run: |
          curl https://nwn.beamdog.net/downloads/nwnee-dedicated-8193.34.zip -O
          unzip nwnee-dedicated-8193.34.zip -d ${{ github.workspace }}/nwn/
          ls -l ${{ github.workspace }}/nwn/

      - name: windows - download nwn
        if: steps.cache-nwn.outputs.cache-hit != 'true' && runner.os == 'Windows'
        run: |
          Invoke-WebRequest https://nwn.beamdog.net/downloads/nwnee-dedicated-8193.34.zip -OutFile nwnee-dedicated-8193.34.zip
          Expand-Archive -Path nwnee-dedicated-8193.34.zip -DestinationPath ${{ github.workspace }}/nwn/
          Get-ChildItem ${{ github.workspace }}/nwn/
        shell: pwsh

      # build the normal libraries
      - name: windows - Visual Studio shell
        if: matrix.os == 'windows-2022'
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64

      - name: setup ccache
        run: |
          ccache --set-config=cache_dir=${{ github.workspace }}/.ccache
          ccache --set-config=max_size=5G
          ccache --set-config=compression=true

      - name: ccache - setenv
        if: ${{ runner.os != 'Windows' }}
        run: |
          env
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          echo "/usr/lib/ccache:/usr/local/opt/ccache/libexec" >> $GITHUB_PATH
          HOST_CCACHE_DIR="$(ccache -k cache_dir)"
          mkdir -p $HOST_CCACHE_DIR

      - name: ccache - setenv
        if: ${{ runner.os == 'Windows' }}
        run: |
          $env:HOST_CCACHE_DIR="$(ccache -k cache_dir)"
          md $env:HOST_CCACHE_DIR -ea 0

      - name: windows - configure
        if: matrix.os == 'windows-2022'
        run: |
          cmake --preset ci-windows

      - name: macOS - configure
        if: matrix.os == 'macos-14'
        run: |
          cmake --preset ci-macos

      - name: linux - configure
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cmake --preset ci-linux

      - name: all - build & test
        run: |
          cmake --build --preset default
          ctest --preset default

      - name: ccache stats
        run: |
          ccache -s

  linux-clang-tests:
    runs-on: ubuntu-22.04
    name: Linux Clang Tests
    steps:
      - name: Get current date
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.29.4

      - name: linux - install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang llvm ccache

      - name: linux - cache ccache
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.ccache/
          key: ubuntu-22.04-clang-ccache-${{ env.DATE }}
          restore-keys: |
            ubuntu-22.04-clang-ccache-

      - name: setup ccache
        run: |
          ccache --set-config=cache_dir=${{ github.workspace }}/.ccache
          ccache --set-config=max_size=5G
          ccache --set-config=compression=true

      - name: linux - cache nwn
        id: cache-nwn
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/nwn/
          key: cache-nwn-3e02cddcea5d0ae82111a3038f14aef6c14d05d9

      - name: linux - download nwn
        if: steps.cache-nwn.outputs.cache-hit != 'true'
        run: |
          curl https://nwn.beamdog.net/downloads/nwnee-dedicated-8193.34.zip -O
          unzip nwnee-dedicated-8193.34.zip -d ${{ github.workspace }}/nwn/

      - name: linux - run
        run: |
          ./scripts/ci/linux_clang_tests.sh

      - name: ccache stats
        run: |
          ccache -s

  linux-clang-asan-ubsan:
    runs-on: ubuntu-22.04
    name: Linux Clang Sanitizers
    steps:
      - name: Get current date
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.29.4

      - name: linux - install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang llvm ccache

      - name: linux - cache ccache
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.ccache/
          key: ubuntu-22.04-clang-asan-ubsan-ccache-${{ env.DATE }}
          restore-keys: |
            ubuntu-22.04-clang-asan-ubsan-ccache-

      - name: setup ccache
        run: |
          ccache --set-config=cache_dir=${{ github.workspace }}/.ccache
          ccache --set-config=max_size=5G
          ccache --set-config=compression=true

      - name: linux - cache nwn
        id: cache-nwn
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/nwn/
          key: cache-nwn-3e02cddcea5d0ae82111a3038f14aef6c14d05d9

      - name: linux - download nwn
        if: steps.cache-nwn.outputs.cache-hit != 'true'
        run: |
          curl https://nwn.beamdog.net/downloads/nwnee-dedicated-8193.34.zip -O
          unzip nwnee-dedicated-8193.34.zip -d ${{ github.workspace }}/nwn/

      - name: linux - run
        env:
          ASAN_OPTIONS: "abort_on_error=1:detect_leaks=0"
        run: |
          ./scripts/ci/linux_clang_asan_ubsan.sh

      - name: ccache stats
        run: |
          ccache -s

  linux-clang-fuzz-smoke:
    runs-on: ubuntu-22.04
    name: Linux Clang Fuzz Smoke
    steps:
      - name: Get current date
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.29.4

      - name: linux - install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang llvm ccache

      - name: linux - cache ccache
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.ccache/
          key: ubuntu-22.04-clang-fuzz-smoke-ccache-${{ env.DATE }}
          restore-keys: |
            ubuntu-22.04-clang-fuzz-smoke-ccache-

      - name: setup ccache
        run: |
          ccache --set-config=cache_dir=${{ github.workspace }}/.ccache
          ccache --set-config=max_size=5G
          ccache --set-config=compression=true

      - name: fuzz smoke
        run: |
          ./scripts/ci/linux_clang_fuzz_smoke.sh

      - name: upload fuzz artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts
          if-no-files-found: ignore
          path: |
            tmp/fuzz-artifacts/**

      - name: ccache stats
        run: |
          ccache -s

  windows-renderer-tools:
    runs-on: windows-2022
    name: Windows MSVC Renderer Build
    steps:
      - name: Get current date
        run: |
          echo "DATE=$(Get-Date -Format yyyy-MM-dd)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: windows - install dependencies
        run: |
          choco upgrade ccache ninja

      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.29.4

      - name: windows - cache ccache
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.ccache/
          key: windows-2022-renderer-ccache-${{ env.DATE }}
          restore-keys: |
            windows-2022-renderer-ccache-

      - name: windows - cache nwn
        id: cache-nwn
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/nwn/
          key: cache-nwn-3e02cddcea5d0ae82111a3038f14aef6c14d05d9

      - name: windows - download nwn
        if: steps.cache-nwn.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest https://nwn.beamdog.net/downloads/nwnee-dedicated-8193.34.zip -OutFile nwnee-dedicated-8193.34.zip
          Expand-Archive -Path nwnee-dedicated-8193.34.zip -DestinationPath ${{ github.workspace }}/nwn/
          Get-ChildItem ${{ github.workspace }}/nwn/
        shell: pwsh

      - name: windows - Visual Studio shell
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64

      - name: setup ccache
        run: |
          ccache --set-config=cache_dir=${{ github.workspace }}/.ccache
          ccache --set-config=max_size=5G
          ccache --set-config=compression=true

      - name: ccache - setenv
        run: |
          $env:HOST_CCACHE_DIR="$(ccache -k cache_dir)"
          md $env:HOST_CCACHE_DIR -ea 0

      - name: windows - configure renderer
        run: |
          cmake --preset ci-windows-renderer

      - name: windows - build renderer tools
        run: |
          cmake --build --preset ci-windows-renderer --target mudl

      - name: ccache stats
        run: |
          ccache -s

  linux-tools-package:
    needs: [build, linux-clang-tests, linux-clang-asan-ubsan]
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.linux-clang-tests.result == 'success' && needs.linux-clang-asan-ubsan.result == 'success' }}
    runs-on: ubuntu-22.04
    name: Linux GCC Tools Package
    permissions:
      contents: write
    steps:
      - name: Get current date
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.29.4

      - name: linux - install dependencies
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y ninja-build gcc-15 g++-15 ccache curl unzip libvulkan-dev mesa-vulkan-drivers libwayland-dev wayland-protocols libxcursor-dev libxfixes-dev libxi-dev libxrandr-dev libxss-dev libxtst-dev libxkbcommon-dev
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-15 100

      - name: linux - cache ccache
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.ccache/
          key: ubuntu-22.04-tools-package-ccache-${{ env.DATE }}
          restore-keys: |
            ubuntu-22.04-tools-package-ccache-

      - name: setup ccache
        run: |
          ccache --set-config=cache_dir=${{ github.workspace }}/.ccache
          ccache --set-config=max_size=5G
          ccache --set-config=compression=true
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          echo "/usr/lib/ccache:/usr/local/opt/ccache/libexec" >> $GITHUB_PATH
          HOST_CCACHE_DIR="$(ccache -k cache_dir)"
          mkdir -p "$HOST_CCACHE_DIR"

      - name: linux - configure tools package
        run: |
          cmake --preset ci-linux-tools-package

      - name: linux - build tools package
        run: |
          cmake --build --preset ci-linux-tools-package --target mudl smalls smalls-lsp smalls-datagen

      - name: linux - package install tree
        env:
          PACKAGE_VERSION: ${{ github.ref_name }}
        run: |
          ARCHIVE_DIR="${{ github.workspace }}/tmp/release"
          PACKAGE_ROOT="rollnw-tools-linux-x64-${PACKAGE_VERSION}"
          mkdir -p "$ARCHIVE_DIR"
          cpack -G TGZ \
            -B "$ARCHIVE_DIR" \
            -D CPACK_PACKAGE_FILE_NAME="$PACKAGE_ROOT" \
            --config build-ci-linux-tools-package/CPackConfig.cmake
          ARCHIVE_COUNT="$(find "$ARCHIVE_DIR" -maxdepth 1 -type f -name '*.tar.gz' | wc -l | tr -d ' ')"
          if [ "$ARCHIVE_COUNT" -ne 1 ]; then
            echo "Expected one TGZ package in $ARCHIVE_DIR, found $ARCHIVE_COUNT" >&2
            exit 1
          fi
          ARCHIVE_PATH="$(find "$ARCHIVE_DIR" -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          ARTIFACT_DIR="${{ github.workspace }}/tmp/artifacts"
          mkdir -p "$ARTIFACT_DIR"
          tar -xzf "$ARCHIVE_PATH" -C "$ARTIFACT_DIR"
          echo "PACKAGE_ARTIFACT=$ARTIFACT_DIR" >> $GITHUB_ENV

      - name: upload linux tools artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-tools-package
          if-no-files-found: error
          path: ${{ env.PACKAGE_ARTIFACT }}

      - name: ccache stats
        run: |
          ccache -s

  windows-tools-package:
    needs: [build, linux-clang-tests, linux-clang-asan-ubsan]
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.linux-clang-tests.result == 'success' && needs.linux-clang-asan-ubsan.result == 'success' }}
    runs-on: windows-2022
    name: Windows MSVC Tools Package
    permissions:
      contents: write
    steps:
      - name: Get current date
        run: |
          echo "DATE=$(Get-Date -Format yyyy-MM-dd)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: windows - install dependencies
        run: |
          choco upgrade ccache ninja

      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.29.4

      - name: windows - cache ccache
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.ccache/
          key: windows-2022-tools-package-ccache-${{ env.DATE }}
          restore-keys: |
            windows-2022-tools-package-ccache-

      - name: windows - Visual Studio shell
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64

      - name: setup ccache
        run: |
          ccache --set-config=cache_dir=${{ github.workspace }}/.ccache
          ccache --set-config=max_size=5G
          ccache --set-config=compression=true
          $env:HOST_CCACHE_DIR="$(ccache -k cache_dir)"
          md $env:HOST_CCACHE_DIR -ea 0

      - name: windows - configure tools package
        run: |
          cmake --preset ci-windows-tools-package

      - name: windows - build tools package
        run: |
          cmake --build --preset ci-windows-tools-package --target mudl smalls smalls-lsp smalls-datagen

      - name: windows - package install tree
        env:
          PACKAGE_VERSION: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $packageRoot = "rollnw-tools-windows-x64-$env:PACKAGE_VERSION"
          $releaseDir = Join-Path "${{ github.workspace }}" "tmp/release"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          Remove-Item -Force -ErrorAction SilentlyContinue (Join-Path $releaseDir "*.zip")
          cpack -G ZIP `
            -B $releaseDir `
            -D "CPACK_PACKAGE_FILE_NAME=$packageRoot" `
            --config build-ci-windows-tools-package/CPackConfig.cmake
          $archives = @(Get-ChildItem -Path $releaseDir -Filter "*.zip" -File)
          if ($archives.Count -ne 1) {
            throw "Expected one ZIP package in $releaseDir, found $($archives.Count)."
          }
          $archivePath = $archives[0].FullName
          $artifactDir = Join-Path "${{ github.workspace }}" "tmp/artifacts"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          Expand-Archive -Path $archivePath -DestinationPath $artifactDir -Force
          "PACKAGE_ARTIFACT=$artifactDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: upload windows tools artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-tools-package
          if-no-files-found: error
          path: ${{ env.PACKAGE_ARTIFACT }}

      - name: ccache stats
        run: |
          ccache -s

  macos-tools-package:
    needs: [build, linux-clang-tests, linux-clang-asan-ubsan]
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.linux-clang-tests.result == 'success' && needs.linux-clang-asan-ubsan.result == 'success' }}
    runs-on: macos-14
    name: macOS AppleClang Tools Package
    permissions:
      contents: write
    steps:
      - name: Get current date
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: macOS - install dependencies
        env:
          HOMEBREW_NO_ANALYTICS: "ON"
          HOMEBREW_NO_AUTO_UPDATE: "ON"
          HOMEBREW_NO_BOTTLE_SOURCE_FALLBACK: "ON"
          HOMEBREW_NO_INSTALL_CLEANUP: "ON"
        run: |
          brew install --force --overwrite pkg-config automake ninja libtool zlib ccache

      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.29.4

      - name: macOS - cache ccache
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.ccache/
          key: macos-14-tools-package-ccache-${{ env.DATE }}
          restore-keys: |
            macos-14-tools-package-ccache-

      - name: setup ccache
        run: |
          ccache --set-config=cache_dir=${{ github.workspace }}/.ccache
          ccache --set-config=max_size=5G
          ccache --set-config=compression=true
          export PATH="/usr/local/opt/ccache/libexec:$PATH"
          echo "/usr/local/opt/ccache/libexec" >> $GITHUB_PATH
          HOST_CCACHE_DIR="$(ccache -k cache_dir)"
          mkdir -p "$HOST_CCACHE_DIR"

      - name: macOS - configure tools package
        run: |
          cmake --preset ci-macos-tools-package

      - name: macOS - build tools package
        run: |
          cmake --build --preset ci-macos-tools-package --target smalls smalls-lsp smalls-datagen

      - name: macOS - package install tree
        env:
          PACKAGE_VERSION: ${{ github.ref_name }}
        run: |
          ARCHIVE_DIR="${{ github.workspace }}/tmp/release"
          PACKAGE_ROOT="rollnw-tools-macos-universal-${PACKAGE_VERSION}"
          mkdir -p "$ARCHIVE_DIR"
          cpack -G TGZ \
            -B "$ARCHIVE_DIR" \
            -D CPACK_PACKAGE_FILE_NAME="$PACKAGE_ROOT" \
            --config build-ci-macos-tools-package/CPackConfig.cmake
          ARCHIVE_COUNT="$(find "$ARCHIVE_DIR" -maxdepth 1 -type f -name '*.tar.gz' | wc -l | tr -d ' ')"
          if [ "$ARCHIVE_COUNT" -ne 1 ]; then
            echo "Expected one TGZ package in $ARCHIVE_DIR, found $ARCHIVE_COUNT" >&2
            exit 1
          fi
          ARCHIVE_PATH="$(find "$ARCHIVE_DIR" -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          ARTIFACT_DIR="${{ github.workspace }}/tmp/artifacts"
          mkdir -p "$ARTIFACT_DIR"
          tar -xzf "$ARCHIVE_PATH" -C "$ARTIFACT_DIR"
          echo "PACKAGE_ARTIFACT=$ARTIFACT_DIR" >> $GITHUB_ENV

      - name: upload macOS tools artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-tools-package
          if-no-files-found: error
          path: ${{ env.PACKAGE_ARTIFACT }}

      - name: ccache stats
        run: |
          ccache -s

  release-packages:
    needs: [linux-tools-package, windows-tools-package, macos-tools-package]
    if: github.event_name == 'release'
    runs-on: ubuntu-22.04
    name: Release Packages
    permissions:
      contents: write
    steps:
      - name: download linux tools artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-tools-package
          path: tmp/release/linux

      - name: download windows tools artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-tools-package
          path: tmp/release/windows

      - name: download macOS tools artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-tools-package
          path: tmp/release/macos

      - name: pack release assets
        env:
          PACKAGE_VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p tmp/release/assets

          LINUX_PACKAGE="rollnw-tools-linux-x64-${PACKAGE_VERSION}"
          WINDOWS_PACKAGE="rollnw-tools-windows-x64-${PACKAGE_VERSION}"
          MACOS_PACKAGE="rollnw-tools-macos-universal-${PACKAGE_VERSION}"

          tar -C tmp/release/linux -czf "tmp/release/assets/${LINUX_PACKAGE}.tar.gz" "$LINUX_PACKAGE"
          (cd tmp/release/windows && zip -qr "${{ github.workspace }}/tmp/release/assets/${WINDOWS_PACKAGE}.zip" "$WINDOWS_PACKAGE")
          tar -C tmp/release/macos -czf "tmp/release/assets/${MACOS_PACKAGE}.tar.gz" "$MACOS_PACKAGE"

      - name: attach consolidated release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            tmp/release/assets/*

  linux-clang-benchmark-canary:
    runs-on: ubuntu-22.04
    name: Linux Clang Benchmark Canary
    continue-on-error: true
    steps:
      - name: Get current date
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - uses: actions/checkout@v7
        with:
          submodules: true
          fetch-depth: 0

      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.29.4

      - name: linux - install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang llvm ccache

      - name: linux - cache ccache
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.ccache/
          key: ubuntu-22.04-clang-bench-ccache-${{ env.DATE }}
          restore-keys: |
            ubuntu-22.04-clang-bench-ccache-

      - name: setup ccache
        run: |
          ccache --set-config=cache_dir=${{ github.workspace }}/.ccache
          ccache --set-config=max_size=5G
          ccache --set-config=compression=true

      - name: linux - cache nwn
        id: cache-nwn
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/nwn/
          key: cache-nwn-3e02cddcea5d0ae82111a3038f14aef6c14d05d9

      - name: linux - download nwn
        if: steps.cache-nwn.outputs.cache-hit != 'true'
        run: |
          curl https://nwn.beamdog.net/downloads/nwnee-dedicated-8193.34.zip -O
          unzip nwnee-dedicated-8193.34.zip -d ${{ github.workspace }}/nwn/

      - name: benchmark canary (contender)
        env:
          NWN_ROOT: "${{ github.workspace }}/nwn/"
        run: |
          ./scripts/ci/ensure_nwn.sh
          cmake --preset ci-linux-clang-bench
          cmake --build --preset ci-linux-clang-bench --target rollnw_benchmark
          cmake --install build-ci-linux-clang-bench --prefix "${{ github.workspace }}/install-bench-contender"
          mkdir -p tmp/bench
          cmake -E chdir "${{ github.workspace }}/install-bench-contender/bin" ./rollnw_benchmark \
            --benchmark_min_time=0.01s \
            --benchmark_repetitions=1 \
            --benchmark_out="${{ github.workspace }}/tmp/bench/contender.json" \
            --benchmark_out_format=json

      - name: benchmark canary (baseline)
        if: github.event_name == 'pull_request'
        env:
          NWN_ROOT: "${{ github.workspace }}/nwn/"
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          git worktree add ../rollnw-base "$BASE_SHA"
          cd ../rollnw-base
          git submodule update --init --recursive
          ./scripts/ci/ensure_nwn.sh
          cmake --preset ci-linux-clang-bench
          cmake --build --preset ci-linux-clang-bench --target rollnw_benchmark
          cmake --install build-ci-linux-clang-bench --prefix "${{ github.workspace }}/install-bench-baseline"
          cmake -E chdir "${{ github.workspace }}/install-bench-baseline/bin" ./rollnw_benchmark \
            --benchmark_min_time=0.01s \
            --benchmark_repetitions=1 \
            --benchmark_out=${{ github.workspace }}/tmp/bench/baseline.json \
            --benchmark_out_format=json

      - name: benchmark canary compare
        if: github.event_name == 'pull_request'
        run: |
          python3 benchmarks/compare_benchmarks.py \
            tmp/bench/baseline.json \
            tmp/bench/contender.json \
            --warn-threshold 10 \
            --min-baseline-ns 50 \
            --top 30 | tee tmp/bench/compare.txt

      - name: benchmark profile bench-pr (contender)
        env:
          NWN_ROOT: "${{ github.workspace }}/nwn/"
        run: |
          FILTER=$(python3 benchmarks/benchmark_profile.py --profile bench-pr --format filter)
          cmake -E chdir "${{ github.workspace }}/install-bench-contender/bin" ./rollnw_benchmark \
            --benchmark_filter="$FILTER" \
            --benchmark_min_time=0.02s \
            --benchmark_repetitions=1 \
            --benchmark_out="${{ github.workspace }}/tmp/bench/contender-bench-pr.json" \
            --benchmark_out_format=json

      - name: benchmark profile bench-pr (baseline)
        if: github.event_name == 'pull_request'
        env:
          NWN_ROOT: "${{ github.workspace }}/nwn/"
        run: |
          FILTER=$(python3 benchmarks/benchmark_profile.py --profile bench-pr --format filter)
          cmake -E chdir "${{ github.workspace }}/install-bench-baseline/bin" ./rollnw_benchmark \
            --benchmark_filter="$FILTER" \
            --benchmark_min_time=0.02s \
            --benchmark_repetitions=1 \
            --benchmark_out="${{ github.workspace }}/tmp/bench/baseline-bench-pr.json" \
            --benchmark_out_format=json

      - name: benchmark profile bench-pr compare
        if: github.event_name == 'pull_request'
        run: |
          python3 benchmarks/compare_benchmarks.py \
            tmp/bench/baseline-bench-pr.json \
            tmp/bench/contender-bench-pr.json \
            --config benchmarks/benchmark_profiles.json \
            --profile bench-pr \
            --warn-threshold 8 \
            --min-baseline-ns 50 \
            --top 30 \
            --out-json tmp/bench/compare-bench-pr.json | tee tmp/bench/compare-bench-pr.txt

      - name: upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-canary
          if-no-files-found: warn
          path: |
            tmp/bench/contender.json
            tmp/bench/baseline.json
            tmp/bench/compare.txt
            tmp/bench/contender-bench-pr.json
            tmp/bench/baseline-bench-pr.json
            tmp/bench/compare-bench-pr.txt
            tmp/bench/compare-bench-pr.json

      - name: ccache stats
        run: |
          ccache -s

  linux-renderer-headless:
    runs-on: ubuntu-22.04
    name: Linux Renderer Headless
    steps:
      - name: Get current date
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.29.4

      - name: linux - install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gcc-13 g++-13 ccache curl unzip libvulkan-dev mesa-vulkan-drivers libwayland-dev wayland-protocols xvfb xauth
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      - name: linux - cache ccache
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.ccache/
          key: ubuntu-22.04-renderer-ccache-${{ env.DATE }}
          restore-keys: |
            ubuntu-22.04-renderer-ccache-

      - name: setup ccache
        run: |
          ccache --set-config=cache_dir=${{ github.workspace }}/.ccache
          ccache --set-config=max_size=5G
          ccache --set-config=compression=true

      - name: linux - cache nwn
        id: cache-nwn
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/nwn/
          key: cache-nwn-3e02cddcea5d0ae82111a3038f14aef6c14d05d9

      - name: linux - download nwn
        if: steps.cache-nwn.outputs.cache-hit != 'true'
        run: |
          ./scripts/ci/ensure_nwn.sh

      - name: linux - configure renderer
        run: |
          cmake --preset ci-linux-renderer

      - name: linux - build renderer tools
        run: |
          cmake --build --preset ci-linux-renderer --target mudl

      - name: linux - headless graphics smoke
        run: |
          ./build-ci-linux-renderer/tools/mudl/mudl stats c_aribeth
          ./build-ci-linux-renderer/tools/mudl/mudl stats c_drgshad
          ./build-ci-linux-renderer/tools/mudl/mudl stats plc_archtarg
          ./build-ci-linux-renderer/tools/mudl/mudl stats ttd01_a04_03
          ./build-ci-linux-renderer/tools/mudl/mudl screenshot c_drgshad ./build-ci-linux-renderer/c_drgshad.png
          ./build-ci-linux-renderer/tools/mudl/mudl screenshot plc_archtarg ./build-ci-linux-renderer/plc_archtarg.png
          ./build-ci-linux-renderer/tools/mudl/mudl screenshot ttd01_a04_03 ./build-ci-linux-renderer/ttd01_a04_03.png

      - name: upload renderer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: renderer-headless-artifacts
          if-no-files-found: error
          path: |
            build-ci-linux-renderer/c_drgshad.png
            build-ci-linux-renderer/plc_archtarg.png
            build-ci-linux-renderer/ttd01_a04_03.png

      - name: ccache stats
        run: |
